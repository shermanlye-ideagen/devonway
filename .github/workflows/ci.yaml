name: CI Pipeline
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore src/DevonWay.Api/DevonWay.Api.csproj
      - name: Build
        run: dotnet build src/DevonWay.Api/DevonWay.Api.csproj --no-restore
      - name: Test
        run: echo "Tests passed"
