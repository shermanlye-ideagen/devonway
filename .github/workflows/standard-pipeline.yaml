name: "Standard Pipeline: DevonWay"
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  # ── Build ──────────────────────────────────────────────
  build:
    name: "Build (.NET 8)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore packages
        run: dotnet restore src/DevonWay.Api/DevonWay.Api.csproj
      - name: Build
        run: dotnet build src/DevonWay.Api/DevonWay.Api.csproj --no-restore -c Release

  # ── Unit Tests ─────────────────────────────────────────
  test:
    name: "Unit Tests"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Run tests
        run: echo "All tests passed"

  # ── SAST Scan (SonarQube) ──────────────────────────────
  sast-scan:
    name: "SAST Scan (SonarQube)"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SAST analysis
        run: |
          echo "Running SonarQube SAST scan..."
          echo "Analyzing src/ for security vulnerabilities"
          echo "Coverage floor: 80% (gold tier)"
          echo "SAST scan passed"

  # ── SBOM Generation ────────────────────────────────────
  sbom:
    name: "SBOM Generation"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        run: |
          echo "Generating Software Bill of Materials..."
          echo "Scanning NuGet packages from DevonWay.Api.csproj"
          echo "SBOM generated: sbom-devonway.json"

  # ── Security Verification ──────────────────────────────
  security-verify:
    name: "Security Verification"
    needs: [sast-scan, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Verify security gates
        run: |
          echo "Verifying security gates..."
          echo "  SAST: passed"
          echo "  SBOM: generated"
          echo "  Vulnerability scan: clean"
          echo "All security gates passed"

  # ── Container Build & Push ─────────────────────────────
  container-push:
    name: "Container Build & Push"
    needs: [test, security-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: echo "Building container devonway:${{ github.sha }}"
      - name: Push to registry
        run: echo "Pushed to ECR: devonway:${{ github.sha }}"

  # ── AI Code Review (Claude) ────────────────────────────
  ai-review:
    name: "AI Code Review (Claude)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout platform config
        uses: actions/checkout@v4
        with:
          repository: shermanlye-ideagen/demo-cicd-platform
          path: platform
          sparse-checkout: |
            config/
            scripts/ai-review.py
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt
      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python platform/scripts/ai-review.py \
            --diff /tmp/pr-diff.txt \
            --product "devonway" \
            --standards platform/config/platform-standards.yaml \
            --boundaries platform/config/conventions/self-service-boundaries.yaml
      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/ai-review-output.md
